name = "ltcast-trial"
main = "index.js"
compatibility_date = "2024-01-01"

# Create KV namespace first:
#   wrangler kv:namespace create TRIAL_KV
# Then paste the ID below:
[[kv_namespaces]]
binding = "TRIAL_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Required secrets (set via wrangler secret put):
#   ADMIN_KEY                    — admin trial reset (testing only)
#   LEMONSQUEEZY_WEBHOOK_SECRET  — LemonSqueezy webhook signature verification
#
# Setup:
#   wrangler secret put ADMIN_KEY
#   wrangler secret put LEMONSQUEEZY_WEBHOOK_SECRET
