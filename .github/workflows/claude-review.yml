name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this LTCast PR — it's an Electron + React timecode player for live
            shows (LTC audio + MTC MIDI + Art-Net + OSC output).

            Focus on:
            1. **Correctness**: bugs, edge cases, race conditions, null/undefined handling
            2. **MIDI / LTC protocol compliance** (SMPTE 12M, MIDI MTC RP-008)
            3. **Live-show reliability**: anything that could fail during a live show
               (timing drift, device disconnects, network glitches, clock rollback)
            4. **Security**: IPC validation, path traversal, input sanitization
            5. **React performance**: unnecessary re-renders, memory leaks, stale closures
            6. **TypeScript strictness**: unsafe casts, any usage, missing null checks

            The project has been through two rounds of self-review already — focus on
            finding issues we MISSED. Be harsh and specific. File:line references required.

            Do NOT comment on style/formatting — only real bugs and critical issues.
          use_sticky_comment: true
