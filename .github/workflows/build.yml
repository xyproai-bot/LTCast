name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run

      - name: Build (Windows)
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist, out, release -ErrorAction SilentlyContinue
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "npm run build failed" }
          # Always --publish never. v0.5.3 hit a race where build-win and
          # build-mac both called --publish always concurrently — second to
          # arrive at the GitHub API silently lost its uploads. Now both jobs
          # only build; the publish-release job downloads the artifacts and
          # uploads them to the release in a single transaction.
          # Invoke electron-builder via node directly: `npx electron-builder`
          # silently exited 0 in <2s on windows-latest historically.
          node node_modules/electron-builder/out/cli/cli.js --win --publish never
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed" }
        env:
          USE_HARD_LINKS: "false"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-win
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run

      - name: Build Universal macOS app
        run: |
          # Always --publish never (see build-win comment for the race fix).
          rm -rf dist out release
          npm run build
          # Pack x64 and arm64 separately, then merge into a Universal binary.
          npx electron-builder --mac --dir --x64
          mv dist/mac dist/mac-x64
          npx electron-builder --mac --dir --arm64
          mv dist/mac-x64 dist/mac
          node scripts/create-universal.js
          rm -rf dist/mac dist/mac-arm64
          # Patch plist and ad-hoc sign
          bash scripts/patch-mac-plist.sh dist/mac-universal/LTCast.app
          bash scripts/sign-mac.sh dist/mac-universal/LTCast.app
          # Create Universal DMG + zip — no publish; publish-release uploads.
          npx electron-builder --mac --pd dist/mac-universal --publish never
        env:
          USE_HARD_LINKS: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-mac
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: LTCast-win
          path: dist-win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: LTCast-mac
          path: dist-mac

      - name: Create / update GitHub Release with all artifacts
        # Single-job publish removes the v0.5.3-era race between concurrent
        # `electron-builder --publish always` calls. We create the release
        # if absent, upload everything in one shot, then mark it latest.
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # Create the release as a draft if it doesn't exist yet (the tag
          # push that triggered this workflow does NOT auto-create a release).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --draft --title "LTCast $TAG" --notes "Release notes will be added shortly."
          fi
          # Upload (or replace) every artifact from both build jobs.
          gh release upload "$TAG" dist-win/* dist-mac/* --clobber
          # Flip to public + latest.
          gh release edit "$TAG" --draft=false --latest --title "LTCast $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
