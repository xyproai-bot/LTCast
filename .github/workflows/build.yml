name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Windows)
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            npm run build && npx electron-builder --win --publish always
          } else {
            npm run build && npx electron-builder --win --publish never
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-win
          path: |
            dist/*.exe
            dist/*.yml

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (macOS)
        run: |
          PUBLISH_FLAG="never"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PUBLISH_FLAG="always"
          fi
          # Step 1: pack to directory (no installer yet)
          npm run build && npx electron-builder --mac --dir
          # Step 2: ad-hoc sign each arch
          for app_dir in dist/mac dist/mac-arm64 dist/mac-universal; do
            if [ -d "$app_dir/LTCast.app" ]; then
              bash scripts/sign-mac.sh "$app_dir/LTCast.app" || true
            fi
          done
          # Step 3: create installers from signed apps and publish
          for app_dir in dist/mac dist/mac-arm64 dist/mac-universal; do
            if [ -d "$app_dir/LTCast.app" ]; then
              npx electron-builder --mac dmg zip --pd "$app_dir" --publish "$PUBLISH_FLAG" || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --title "LTCast ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
