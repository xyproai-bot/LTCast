name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Windows)
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            npm run build && npx electron-builder --win --publish always
          } else {
            npm run build && npx electron-builder --win --publish never
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CueSync-win
          path: |
            dist/*.exe
            dist/*.yml

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (macOS)
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm run build && npx electron-builder --mac --publish always
          else
            npm run build && npx electron-builder --mac --publish never
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CueSync-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --title "CueSync ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
