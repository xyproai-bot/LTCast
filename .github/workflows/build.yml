name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build and publish (Windows)
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            npm run build && npx electron-builder --win --publish always
          } else {
            npm run build && npx electron-builder --win --publish never
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-win
          path: |
            dist/*.exe
            dist/*.yml

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Universal macOS app
        run: |
          PUBLISH_FLAG="never"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            PUBLISH_FLAG="always"
          fi
          # Build JS
          npm run build
          # Pack x64 and arm64 separately
          npx electron-builder --mac --dir --x64
          npx electron-builder --mac --dir --arm64
          # Merge into Universal binary
          node scripts/create-universal.js
          # Patch plist and ad-hoc sign
          bash scripts/patch-mac-plist.sh dist/mac-universal/LTCast.app
          bash scripts/sign-mac.sh dist/mac-universal/LTCast.app
          # Create Universal DMG + zip and publish
          npx electron-builder --mac --pd dist/mac-universal --publish "$PUBLISH_FLAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: LTCast-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --title "LTCast ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
