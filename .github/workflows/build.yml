name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Windows)
        # --publish always: builds installer + generates latest.yml + uploads to GitHub Release
        # --publish never:  builds installer only (manual workflow_dispatch, no release)
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            npm run build && npx electron-builder --win --publish always
          } else {
            npm run build && npx electron-builder --win --publish never
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: CueSync-win
          path: |
            dist/*.exe
            dist/*.yml

  # build-mac: disabled until Mac version is tested
  # Re-enable when Mac support is ready
